version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      # @types/node must track the Node major pinned in mise.toml (currently 24).
      # Bump this rule when the runtime major changes.
      - dependency-name: "@types/node"
        versions: [">=25"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
