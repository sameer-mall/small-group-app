services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: smallgroup
      POSTGRES_PASSWORD: smallgroup
      POSTGRES_DB: smallgroup
    ports:
      - "5432:5432"
    volumes:
      - smallgroup-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smallgroup"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  smallgroup-pgdata:
