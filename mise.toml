[tools]
node = "24"
pnpm = "10"

[tasks.dev]
run = "pnpm next dev"

[tasks.build]
run = "pnpm next build"

[tasks.lint]
run = "pnpm eslint ."

[tasks.typecheck]
run = "pnpm tsc --noEmit"

[tasks.test]
run = "pnpm vitest run"

[tasks."db:up"]
run = "docker compose up -d db --wait"

[tasks."db:down"]
run = "docker compose down"

[tasks."db:generate"]
run = "pnpm drizzle-kit generate"

[tasks."db:migrate"]
run = "pnpm drizzle-kit migrate"
